name: Exploring Variables and Secerts

on:
  push

## remove the DOCKER_USERNAME: it is in the repo level for variables a
env: 
    CONTAINER_REGISTRY: docker.io 
    IMAGE_NAME: github-actions-nginx

jobs:
  docker: 
    runs-on: ubuntu-latest
    steps: 
    - name: Docker Build 
      run: echo docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME

### use the secret using ${{secrets.name of the secret}} inputs the secret created it can be from the env level, repo level (demo this level), orginiatization level settings for each 
    - name: Docker Login 
      run: echo docker login --username=$DOCKER_USERNAME --password=${{ secrets.DOCKER_PASSWORD }}
#### only use the docker password on the login level thats why its not on the job and env variables are put at the job level to reduce redundency 
    
    - name: Docker Publish 
      run: echo docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest 


  deploy:
    needs: docker   
    runs-on: ubuntu-latest 
    steps:
    - name: docker run 
      run: echo docker -d -p 8000:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME